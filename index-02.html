<html>
    <title>
    Obtaining current Time and Date 
    </title>
    <body>
        <h1>Obtaining Current Time and Date</h1>
        <button type="button" onclick="document.getElementById('demo').innerHTML= new Date()">
            Click me to display the date and time.
        </button>
        <p id="demo"></p>
    </body>
</html>
